  <style>
    /* Hide the default Google Translate top banner and iframe */
    body { top: 0 !important; }
    .skiptranslate iframe, .VIpgJd-ZVi9od-ORHb-OEVmcd { display: none !important; }
    .goog-te-gadget { color: transparent !important; }
    .goog-te-gadget .goog-te-combo { margin: 0; padding: 4px; border-radius: 4px; }
  </style>

  <script>
    // Monkey patch DOM methods to prevent React crashes when Google Translate mutates text nodes
    if (typeof Node === 'function' && Node.prototype) {
      const originalRemoveChild = Node.prototype.removeChild;
      Node.prototype.removeChild = function(child) {
        if (child.parentNode !== this) {
          if (console) console.warn('Ignored DOMException: Cannot remove child from a different parent');
          return child;
        }
        return originalRemoveChild.apply(this, arguments);
      };
      const originalInsertBefore = Node.prototype.insertBefore;
      Node.prototype.insertBefore = function(newNode, referenceNode) {
        if (referenceNode && referenceNode.parentNode !== this) {
          if (console) console.warn('Ignored DOMException: Cannot insert before reference node from a different parent');
          return newNode;
        }
        return originalInsertBefore.apply(this, arguments);
      };
    }
  </script>
</head>
<body>
  <!-- Google Translate Widget Initialization -->
  <div id="google_translate_element" style="display:none;"></div>
  <script type="text/javascript">
    function googleTranslateElementInit() {
      new google.translate.TranslateElement({
        pageLanguage: 'en',
        includedLanguages: 'en,te,hi,kn,ta,ml,mr,gu,bn,pa,ur,or,as',
        autoDisplay: false
      }, 'google_translate_element');
    }
  </script>
  <script src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
  
  <div id="root"></div>

  <script type="module" src="/src/main.jsx"></script>
</body>
